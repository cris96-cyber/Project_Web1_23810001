<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web1 Project - Gallery</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
      <main>
          <section class="page-hero">
              <div class="container">
                  <h1>Gallery</h1>
                  <p>
                      Filter gallery images by category and open each item on its own detail page.
                  </p>
              </div>
          </section>
          <section class="section">
              <div class="container">
                  <div class="section-title">
                      <h2>Explore the gallery</h2>

                  <div class="filterbar" id="galleryFilters"></div>
                  <div class="grid" id="galleryGrid"></div>
              </div>
          </section>
      </main>

      <script>
          document.addEventListener("DOMContentLoaded", renderGallery);
      </script>
